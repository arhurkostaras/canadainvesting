<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Set New Password - CanadaInvesting.app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-purple: #667eea; --primary-violet: #764ba2; --accent-green: #059669; --dark-bg: #0a0a0a; --card-bg: #1a1a1a; --text-primary: #ffffff; --text-secondary: #a0a0a0; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 64px; }
        .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; font-weight: 700; font-size: 1.25rem; }
        .nav-logo .maple { color: var(--primary-purple); font-size: 1.5rem; }
        .nav-links { display: flex; align-items: center; gap: 24px; list-style: none; }
        .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: white; }
        .nav-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 4px; }
        .nav-links.active { display: flex; }
        .page-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 24px 60px; }
        .form-card { max-width: 440px; width: 100%; }
        .form-header { text-align: center; margin-bottom: 32px; }
        .form-header h2 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
        .form-header p { color: var(--text-secondary); font-size: 0.95rem; }
        .form-body { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 32px; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; font-family: inherit; transition: border-color 0.3s; }
        .input-group input:focus { outline: none; border-color: var(--primary-purple); }
        .input-group input::placeholder { color: #666; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary-purple), var(--primary-violet)); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: inherit; margin-top: 8px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .message { margin-top: 16px; text-align: center; font-size: 0.85rem; padding: 12px; border-radius: 8px; display: none; }
        .message.error { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        .message.success { display: block; background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.3); color: var(--accent-green); }
        .no-token-error { text-align: center; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 24px; }
        .no-token-error p { color: #ef4444; }
        .no-token-error a { display: inline-block; margin-top: 16px; color: var(--primary-purple); text-decoration: none; font-weight: 500; }
        .no-token-error a:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-links { display: none; position: absolute; top: 64px; left: 0; right: 0; flex-direction: column; align-items: center; gap: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .nav-links.active { display: flex; }
            .nav-links a { padding: 14px 24px; width: 100%; text-align: center; }
            .page-container { padding: 80px 16px 40px; }
            .form-body { padding: 24px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo"><i class="fas fa-maple-leaf maple"></i> CanadaInvesting<span style="color: var(--primary-purple)">.app</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="advisor-login">Login</a>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="form-card">
            <div class="form-header">
                <h2>Set New Password</h2>
                <p>Enter your new password below.</p>
            </div>

            <div id="noTokenError" class="no-token-error" style="display: none;">
                <p style="font-weight: 600;">Invalid or missing reset link.</p>
                <p style="font-size: 0.85rem; margin-top: 4px;">Please request a new password reset.</p>
                <a href="forgot-password">Request New Reset Link</a>
            </div>

            <form class="form-body" id="resetForm">
                <div class="input-group">
                    <input id="newPassword" type="password" required minlength="8" placeholder="New password (min 8 characters)">
                </div>
                <div class="input-group">
                    <input id="confirmPassword" type="password" required minlength="8" placeholder="Confirm new password">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
                <div id="successMessage" class="message"></div>
                <div id="errorMessage" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('noTokenError').style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            successMsg.className = 'message';
            errorMsg.className = 'message';

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.className = 'message error';
                return;
            }

            if (newPassword.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters.';
                errorMsg.className = 'message error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch('https://canadainvesting-backend-production.up.railway.app/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = 'Password reset successfully! Redirecting to login...';
                    successMsg.className = 'message success';
                    document.getElementById('resetForm').querySelector('button').style.display = 'none';
                    setTimeout(() => { window.location.href = 'advisor-login'; }, 2000);
                } else {
                    throw new Error(data.error || 'Failed to reset password');
                }
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.className = 'message error';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
