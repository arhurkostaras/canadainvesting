<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Advisor Login - CanadaInvesting.app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #2563eb; --primary-navy: #1e3a8a; --accent-green: #059669; --dark-bg: #0a0a0a; --card-bg: #1a1a1a; --text-primary: #ffffff; --text-secondary: #a0a0a0; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--text-primary); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 64px; }
        .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; font-weight: 700; font-size: 1.25rem; }
        .nav-logo .maple { color: var(--primary-blue); font-size: 1.5rem; }
        .nav-links { display: flex; align-items: center; gap: 24px; list-style: none; }
        .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: white; }
        .nav-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 4px; }
        .nav-links.active { display: flex; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 24px 60px; }
        .login-card { max-width: 440px; width: 100%; }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h2 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
        .login-header p { color: var(--text-secondary); font-size: 0.95rem; }
        .login-form { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 32px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; font-family: inherit; transition: border-color 0.3s; }
        .input-group input:focus { outline: none; border-color: var(--primary-blue); }
        .input-group input::placeholder { color: #666; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .remember { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .remember input { accent-color: var(--primary-blue); }
        .forgot-link { color: var(--primary-blue); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .forgot-link:hover { text-decoration: underline; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary-blue), var(--primary-navy)); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .message { margin-top: 16px; text-align: center; font-size: 0.85rem; padding: 12px; border-radius: 8px; display: none; }
        .message.error { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        .message.success { display: block; background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.3); color: var(--accent-green); }
        .register-link { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary); }
        .register-link a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-links { display: none; position: absolute; top: 64px; left: 0; right: 0; flex-direction: column; align-items: center; gap: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .nav-links.active { display: flex; }
            .nav-links a { padding: 14px 24px; width: 100%; text-align: center; }
            .login-container { padding: 80px 16px 40px; }
            .login-form { padding: 24px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo"><i class="fas fa-maple-leaf maple"></i> CanadaInvesting<span style="color: var(--primary-blue)">.app</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="pricing">Pricing</a>
                <a href="why-we-win">Why We Win</a>
                <a href="contact">Contact</a>
                <a href="join-as-advisor" class="nav-cta" style="background: white; color: var(--primary-blue); padding: 10px 24px; border-radius: 8px; font-weight: 700;">Apply to Join</a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Advisor Dashboard Login</h2>
                <p>Access your CanadaInvesting member dashboard</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email" required placeholder="Email address">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required placeholder="Password">
                </div>

                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" id="remember-me" name="remember-me"> Remember me
                    </label>
                    <a href="forgot-password" class="forgot-link">Forgot your password?</a>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">Sign in to Dashboard</button>

                <div id="errorMessage" class="message"></div>
                <div id="successMessage" class="message"></div>
            </form>

            <div class="register-link">
                Don't have an account? <a href="advisor-onboarding">Register as an Advisor</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            errorMessage.className = 'message';
            successMessage.className = 'message';

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('https://canadainvesting-backend-production.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('advisor_token', data.token);
                    localStorage.setItem('advisor_user', JSON.stringify(data.user));

                    const isAdmin = data.user.userType === 'admin';
                    const destination = isAdmin ? '/admin-dashboard' : '/advisor-dashboard';

                    successMessage.textContent = `Login successful! Redirecting to ${isAdmin ? 'admin ' : ''}dashboard...`;
                    successMessage.className = 'message success';

                    setTimeout(() => { window.location.href = destination; }, 1500);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.className = 'message error';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in to Dashboard';
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('advisor_token');
            if (token) {
                const storedUser = JSON.parse(localStorage.getItem('advisor_user') || '{}');
                const dest = storedUser.userType === 'admin' ? '/admin-dashboard' : '/advisor-dashboard';
                fetch('https://canadainvesting-backend-production.up.railway.app/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(response => {
                    if (response.ok) window.location.href = dest;
                }).catch(() => {
                    localStorage.removeItem('advisor_token');
                    localStorage.removeItem('advisor_user');
                });
            }
        });
    </script>
</body>
</html>
